<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retoule – Checklist</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4a90d9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Retoule">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #2d3748;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: .5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      padding: .55rem 1.4rem;
      border: 2px solid #4a90d9;
      background: transparent;
      color: #4a90d9;
      border-radius: 999px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .tab-btn.active {
      background: #4a90d9;
      color: #fff;
    }

    /* Card */
    .card {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      padding: 1.5rem 1.25rem;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 1.2rem;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      color: #718096;
      margin-bottom: .35rem;
    }
    .progress-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #48bb78;
      border-radius: 999px;
      transition: width .3s ease;
    }

    /* Checklist items */
    .checklist { list-style: none; }
    .checklist li {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: .75rem .5rem;
      border-bottom: 1px solid #f0f4f8;
      transition: background .15s;
      border-radius: 8px;
    }
    .checklist li:last-child { border-bottom: none; }
    .checklist li:hover { background: #f7fafc; }

    .checklist li label {
      flex: 1;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1.4;
      transition: color .2s, text-decoration .2s;
    }
    .checklist li.done label {
      color: #a0aec0;
      text-decoration: line-through;
    }

    /* Custom checkbox */
    .check-box {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s, background .2s;
    }
    .check-box:hover { border-color: #4a90d9; }
    .checklist li.done .check-box {
      background: #48bb78;
      border-color: #48bb78;
    }
    .check-box svg { display: none; }
    .checklist li.done .check-box svg { display: block; }

    /* Timestamp */
    .ts {
      font-size: .72rem;
      color: #a0aec0;
      white-space: nowrap;
      min-width: 80px;
      text-align: right;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: .75rem;
      justify-content: flex-end;
      margin-top: 1.4rem;
      flex-wrap: wrap;
    }
    button {
      padding: .5rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    .btn-reset {
      background: #fed7d7;
      color: #c53030;
    }
    .btn-save {
      background: #4a90d9;
      color: #fff;
    }

    /* Last save info */
    .save-info {
      text-align: center;
      font-size: .8rem;
      color: #a0aec0;
      margin-top: 1rem;
    }

    /* Hidden panel */
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<h1>🏠 Retoule – Checklist  Départ</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('totale')">Check Liste Totale</button>
  <button class="tab-btn"        onclick="switchTab('partielle')">Check Liste Partielle</button>
</div>

    <li data-id="totale-9"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Vidanger la douche du bas</label><span class="ts"></span></li>
    <li data-id="totale-10"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Ouvrir la porte du réfrigérateur</label><span class="ts"></span></li>
    <li data-id="totale-11"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Couper le courant</label><span class="ts"></span></li>
    <li data-id="totale-12"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Fermer la barrière</label><span class="ts"></span></li>
    <li data-id="totale-13"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Fermer les portes</label><span class="ts"></span></li>
  </ul>
  <div class="actions">
    <button class="btn-reset" onclick="resetList('totale')">Réinitialiser</button>
    <button class="btn-save"  onclick="saveList('totale')">Enregistrer</button>
  </div>
  <p class="save-info" id="save-info-totale"></p>
</div>

<!-- PARTIELLE -->
<div id="panel-partielle" class="card panel">

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progression</span>
      <span id="progress-label-partielle">0 / 11</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill-partielle" style="width:0%"></div></div>
  </div>
  <ul class="checklist" id="list-partielle">
    <li data-id="partielle-0"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Fermer les volets surtout celui de la cuisine</label><span class="ts"></span></li>
    <li data-id="partielle-1"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Couper l'eau</label><span class="ts"></span></li>

    <li data-id="partielle-4"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Vider les pellets du poêle</label><span class="ts"></span></li>
    <li data-id="partielle-5"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Nettoyer le poêle</label><span class="ts"></span></li>
    <li data-id="partielle-6"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Ouvrir la porte du réfrigérateur</label><span class="ts"></span></li>
    <li data-id="partielle-7"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Vidanger la douche du bas</label><span class="ts"></span></li>

    <li data-id="partielle-10"><div class="check-box" onclick="toggle(this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><label onclick="toggle(this.previousElementSibling)">Fermer les portes</label><span class="ts"></span></li>

  <div class="actions">
    <button class="btn-reset" onclick="resetList('partielle')">Réinitialiser</button>
    <button class="btn-save"  onclick="saveList('partielle')">Enregistrer</button>
  </div>
  <p class="save-info" id="save-info-partielle"></p>
</div>

<script>
  const STORAGE_KEY = 'retoule_checklist';

  // ── State ──────────────────────────────────────────────────────────────────
  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // ── Toggle a single item ───────────────────────────────────────────────────
  function toggle(checkBox) {
    const li = checkBox.closest('li');
    const id  = li.dataset.id;
    const list = id.split('-')[0];
    const isDone = li.classList.toggle('done');

    const ts = li.querySelector('.ts');
    const now = isDone ? fmtDate(new Date()) : '';
    ts.textContent = now;

    const state = loadState();
    if (!state[list]) state[list] = {};
    state[list][id] = isDone ? { done: true, ts: now } : { done: false, ts: '' };
    saveState(state);

    updateProgress(list);
  }

  // ── Progress bar ───────────────────────────────────────────────────────────
  function updateProgress(list) {
    const items = document.querySelectorAll(`#list-${list} li`);
    const done  = document.querySelectorAll(`#list-${list} li.done`).length;
    const total = items.length;
    document.getElementById(`progress-fill-${list}`).style.width  = (done / total * 100) + '%';
    document.getElementById(`progress-label-${list}`).textContent = `${done} / ${total}`;
  }

  // ── Reset a list ───────────────────────────────────────────────────────────
  function resetList(list) {
    if (!confirm('Réinitialiser toute la liste ?')) return;
    document.querySelectorAll(`#list-${list} li`).forEach(li => {
      li.classList.remove('done');
      li.querySelector('.ts').textContent = '';
    });
    const state = loadState();
    state[list] = {};
    saveState(state);
    updateProgress(list);
    document.getElementById(`save-info-${list}`).textContent = '';
  }

  // ── Manual save (with confirmation message) ────────────────────────────────
  function saveList(list) {
    // Auto-save already happens on each toggle; this just gives user feedback.
    const state = loadState();
    const items = state[list] || {};
    const done  = Object.values(items).filter(v => v.done).length;
    const total = document.querySelectorAll(`#list-${list} li`).length;
    const info  = document.getElementById(`save-info-${list}`);
    info.textContent = `Enregistré le ${fmtDate(new Date())} — ${done}/${total} tâches complétées`;
    // Persist the save timestamp separately
    state[`${list}_saved`] = new Date().toISOString();
    saveState(state);
  }

  // ── Tab switch ─────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // ── Format date ───────────────────────────────────────────────────────────
  function fmtDate(d) {
    return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' })
           + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  }

  // ── Service Worker ─────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  // ── Restore state on load ──────────────────────────────────────────────────
  (function restore() {
    const state = loadState();
    ['totale', 'partielle'].forEach(list => {
      const saved = state[list] || {};
      document.querySelectorAll(`#list-${list} li`).forEach(li => {
        const entry = saved[li.dataset.id];
        if (entry && entry.done) {
          li.classList.add('done');
          li.querySelector('.ts').textContent = entry.ts || '';
        }
      });
      updateProgress(list);

      const savedAt = state[`${list}_saved`];
      if (savedAt) {
        document.getElementById(`save-info-${list}`).textContent =
          `Dernier enregistrement : ${fmtDate(new Date(savedAt))}`;
      }
    });
  })();
</script>
</body>
</html>
